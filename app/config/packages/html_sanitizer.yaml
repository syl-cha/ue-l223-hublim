framework:
    html_sanitizer:
        sanitizers:
            default:
                # Autorise toutes les balises "sûres" du web (p, b, i, ul, li, etc.)
                allow_safe_elements: true
                # Autorise les attributs sûrs (comme href pour les liens)
                allow_safe_attributes: true
                # (Optionnel) Forcer les liens à s'ouvrir dans un nouvel onglet
                force_attributes:
                    a: { target: "_blank", rel: "noopener noreferrer" }
